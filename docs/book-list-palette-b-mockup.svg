<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#24445c" flood-opacity="0.10"/>
    </filter>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .serif { font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif; }
    </style>
  </defs>

  <rect width="900" height="1200" fill="#f6f8fa"/>

  <g transform="translate(250 48)">
    <rect width="400" height="1104" rx="42" fill="#eef3f6"/>
    <rect x="16" y="16" width="368" height="1072" rx="32" fill="#f6f8fa"/>

    <g transform="translate(38 42)">
      <rect x="0" y="0" width="324" height="56" rx="18" fill="#ffffff" stroke="#d6e2ea"/>
      <text x="162" y="36" text-anchor="middle" class="sans" font-size="19" font-weight="800" fill="#1f2f3d">书库</text>
      <circle cx="286" cy="28" r="15" fill="#edf4f8"/>
      <path d="M282 28a5 5 0 1 0 10 0a5 5 0 1 0-10 0M291 37l8 8" stroke="#24445c" stroke-width="2.3" stroke-linecap="round" fill="none"/>
    </g>

    <g transform="translate(38 128)" filter="url(#softShadow)">
      <rect width="324" height="138" rx="14" fill="#edf4f8" stroke="#d6e2ea"/>
      <text x="20" y="38" class="sans" font-size="13" font-weight="800" fill="#60717f">继续阅读</text>
      <text x="20" y="76" class="serif" font-size="30" font-weight="800" fill="#1f2f3d">《瓦尔登湖》</text>
      <text x="20" y="104" class="sans" font-size="15" fill="#60717f">亨利·戴维·梭罗 · 第 5 / 60 页</text>
      <rect x="214" y="82" width="88" height="38" rx="10" fill="#24445c"/>
      <text x="258" y="106" text-anchor="middle" class="sans" font-size="14" font-weight="800" fill="#ffffff">继续阅读</text>
    </g>

    <text x="38" y="314" class="sans" font-size="16" font-weight="800" fill="#1f2f3d">全部书籍</text>
    <text x="326" y="314" text-anchor="end" class="sans" font-size="13" font-weight="700" fill="#60717f">共 4 本</text>

    <g transform="translate(38 336)">
      <g>
        <rect width="324" height="118" rx="14" fill="#ffffff" stroke="#d6e2ea"/>
        <text x="16" y="34" class="serif" font-size="24" font-weight="800" fill="#1f2f3d">《瓦尔登湖》</text>
        <text x="16" y="60" class="sans" font-size="13" fill="#60717f">亨利·戴维·梭罗</text>
        <text x="16" y="88" class="sans" font-size="15" fill="#384a5a">真正的生活并不在远方，而在当下每一刻...</text>
        <text x="276" y="94" text-anchor="end" class="sans" font-size="12" font-weight="800" fill="#60717f">60 页</text>
        <path d="M302 52l7 7l-7 7" stroke="#60717f" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect y="115" width="324" height="3" fill="rgba(36,68,92,0.12)"/>
        <rect y="115" width="28" height="3" fill="#24445c"/>
      </g>

      <g transform="translate(0 136)">
        <rect width="324" height="118" rx="14" fill="#ffffff" stroke="#d6e2ea"/>
        <text x="16" y="34" class="serif" font-size="24" font-weight="800" fill="#1f2f3d">《呼兰河传》</text>
        <text x="16" y="60" class="sans" font-size="13" fill="#60717f">萧红</text>
        <text x="16" y="88" class="sans" font-size="15" fill="#384a5a">在一座被寒冷、习俗、麻木与荒凉层层包围...</text>
        <text x="276" y="94" text-anchor="end" class="sans" font-size="12" font-weight="800" fill="#60717f">133 页</text>
        <path d="M302 52l7 7l-7 7" stroke="#60717f" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect y="115" width="324" height="3" fill="rgba(36,68,92,0.12)"/>
      </g>

      <g transform="translate(0 272)">
        <rect width="324" height="118" rx="14" fill="#ffffff" stroke="#d6e2ea"/>
        <text x="16" y="34" class="serif" font-size="24" font-weight="800" fill="#1f2f3d">《人鼠之间》</text>
        <text x="16" y="60" class="sans" font-size="13" fill="#60717f">约翰·斯坦贝克</text>
        <text x="16" y="88" class="sans" font-size="15" fill="#384a5a">人和老鼠最精心的计划，也常常落空。</text>
        <text x="276" y="94" text-anchor="end" class="sans" font-size="12" font-weight="800" fill="#60717f">39 页</text>
        <path d="M302 52l7 7l-7 7" stroke="#60717f" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect y="115" width="324" height="3" fill="rgba(36,68,92,0.12)"/>
      </g>

      <g transform="translate(0 408)">
        <rect width="324" height="118" rx="14" fill="#ffffff" stroke="#d6e2ea"/>
        <text x="16" y="34" class="serif" font-size="24" font-weight="800" fill="#1f2f3d">《时间机器》</text>
        <text x="16" y="60" class="sans" font-size="13" fill="#60717f">赫伯特·乔治·威尔斯</text>
        <text x="16" y="88" class="sans" font-size="15" fill="#384a5a">人类的力量与智慧，最终也可能只是时间长河...</text>
        <text x="276" y="94" text-anchor="end" class="sans" font-size="12" font-weight="800" fill="#60717f">39 页</text>
        <path d="M302 52l7 7l-7 7" stroke="#60717f" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect y="115" width="324" height="3" fill="rgba(36,68,92,0.12)"/>
      </g>
    </g>
  </g>

  <g transform="translate(72 74)">
    <text class="sans" font-size="30" font-weight="900" fill="#1f2f3d">方案 B</text>
    <text y="38" class="sans" font-size="18" font-weight="700" fill="#60717f">纸页蓝灰</text>
    <text y="78" class="sans" font-size="15" fill="#60717f">更轻、更克制，保留继续阅读卡片的清爽感</text>
    <g transform="translate(0 118)">
      <rect width="56" height="56" rx="14" fill="#f6f8fa" stroke="#d6e2ea"/>
      <rect x="70" width="56" height="56" rx="14" fill="#edf4f8"/>
      <rect x="140" width="56" height="56" rx="14" fill="#24445c"/>
      <rect x="210" width="56" height="56" rx="14" fill="#60717f"/>
    </g>
  </g>
</svg>
